  p.querySelectorAll('button[data-p]').forEach((b) => b.addEventListener('click', () => {
    if (b.disabled) return;
    const np = Number(b.dataset.p);
    if (np < 1 || np > pages || np === page) return;
    page = np;
    renderGrid();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }));
}
function openDetail(i) {
  cur = VIEW[i]; curIdx = 0;
  if (!cur) return;
  renderSheet();
  $('#ov').classList.add('show');
  document.body.style.overflow = 'hidden';
  countView(cur);
}
function closeDetail() {
  $('#ov').classList.remove('show');
  document.body.style.overflow = '';
  if (location.search.indexOf('car=') !== -1) history.replaceState(null, '', location.pathname + _branchQS);
}
// ── คนดูสด (Supabase Realtime Presence) — นับเฉพาะลูกค้า (ไม่นับเจ้าของ) ──
function startPresence() {
  if (!db || presenceChannel) return;
  const key = (self.crypto && crypto.randomUUID) ? crypto.randomUUID() : 'u' + Math.random().toString(36).slice(2);
  presenceChannel = db.channel('showroom-live', { config: { presence: { key } } });
  presenceChannel.on('presence', { event: 'sync' }, () => {
    const st = presenceChannel.presenceState();
    let n = 0;
    Object.values(st).forEach((arr) => arr.forEach((p) => { if (!p.owner) n++; }));
    liveCount = n; updateLiveUI();
  });
  presenceChannel.subscribe(async (status) => {
    if (status === 'SUBSCRIBED') { try { await presenceChannel.track({ owner: isOwner(), at: Date.now() }); } catch (e) {} }
  });
}
function retrackPresence() { if (presenceChannel) { try { presenceChannel.track({ owner: isOwner(), at: Date.now() }); } catch (e) {} } }
function updateLiveUI() { const el = $('#statLive'); if (el) el.textContent = liveCount; }
function updateStatsBtn() { const b = $('#statsBtn'); if (b) b.style.display = isOwner() ? 'grid' : 'none'; }
// ── หน้าสถิติ (เฉพาะเจ้าของ) ──
function openStats() {
  $('#statsSheet').innerHTML =
    '<div class="stats-hd"><h2>📊 สถิติร้าน <small>(เฉพาะเจ้าของ)</small></h2><button class="sh-x" id="statsX" aria-label="ปิด">✕</button></div>' +
    '<div class="stats-live">🟢 ลูกค้ากำลังดูตอนนี้ <b id="statLive">' + liveCount + '</b> คน</div>' +
    '<div class="stats-total">📈 ยอดดูรวมทั้งเว็บ <b id="statTotal">…</b> ครั้ง</div>' +
    '<h3>👁 รถยอดนิยม</h3><div id="statList">กำลังโหลด…</div>' +
    '<div class="stats-foot"><button id="ownerOff" class="stats-btn-off">ออกจากโหมดเจ้าของ</button>' +
    '<span class="stats-note">เครื่องนี้ถูกตั้งเป็น “เจ้าของ” — การกดดูของคุณจะไม่ถูกนับในสถิติ</span></div>';
  $('#statsX').addEventListener('click', closeStats);
  $('#ownerOff').addEventListener('click', () => { setOwner(false); retrackPresence(); updateStatsBtn(); showToast('ออกจากโหมดเจ้าของแล้ว'); closeStats(); });
  $('#statsOv').classList.add('show'); document.body.style.overflow = 'hidden';
  loadStats();
}
function closeStats() { $('#statsOv').classList.remove('show'); document.body.style.overflow = ''; }
async function loadStats() {
  try {
    const { data, error } = await db.from('car_view_ranking').select('*').limit(100);
    if (error) throw error;
    const rows = data || [];
    const total = rows.reduce((s, r) => s + (Number(r.views) || 0), 0);
    const tEl = $('#statTotal'); if (tEl) tEl.textContent = total.toLocaleString('th-TH');
    const listEl = $('#statList'); if (!listEl) return;
    if (!rows.length) { listEl.innerHTML = '<div class="stats-empty">ยังไม่มีข้อมูลการดู — รอลูกค้าเข้ามาชมก่อนนะครับ</div>'; return; }
    listEl.innerHTML = rows.slice(0, 20).map((r, i) =>
      '<button class="stat-row" data-car="' + esc(r.car_id) + '">' +
      '<span class="stat-rank">' + (i + 1) + '</span>' +
      '<img src="' + esc(r.cover_image_url || '') + '" alt="" onerror="this.style.visibility=\'hidden\'">' +
      '<span class="stat-name">' + esc([r.brand, r.model, r.sub_model].filter(Boolean).join(' ')) + (r.year ? ' ' + esc(r.year) : '') + '</span>' +
      '<span class="stat-views">👁 ' + Number(r.views).toLocaleString('th-TH') + '</span></button>'
    ).join('');
    listEl.querySelectorAll('.stat-row').forEach((b) => b.addEventListener('click', () => { closeStats(); openCarById(b.dataset.car); }));
  } catch (e) {
    const listEl = $('#statList'); if (listEl) listEl.innerHTML = '<div class="stats-empty">โหลดสถิติไม่สำเร็จ — รัน showroom_stats.sql ใน Supabase แล้วหรือยังครับ?</div>';
  }
}
function gallery(d) {
  if (curIdx < 0) curIdx = 0;
  if (curIdx > d - 1) curIdx = d - 1;
  if ($('#shImg')) $('#shImg').src = cur.images[curIdx] || cur.cover_image_url || '';
  if ($('#shCount')) $('#shCount').textContent = (curIdx + 1) + '/' + d;
  document.querySelectorAll('.sh-thumbs img').forEach((t, k) => t.classList.toggle('on', k === curIdx));
}
function renderSheet() {
  const c = cur;
  const imgs = c.images && c.images.length ? c.images : (c.cover_image_url ? [c.cover_image_url] : []);
  const specs = [['ปีรถ', c.year], ['เลขไมล์', c.mileage], ['เครื่องยนต์', c.engine], ['เกียร์', c.gear]].filter((p) => p[1] != null && p[1] !== '');
  $('#sheet').innerHTML =
    '<div class="sh-hero">' +
    (imgs.length ? '<img id="shImg" src="' + esc(imgs[0]) + '" alt="' + esc(carName(c)) + '">' : '<div class="noimg" style="height:100%;display:grid;place-items:center;font-size:3rem;color:#fff">🚗</div>') +
    '<button class="sh-x" id="shX" aria-label="ปิด">✕</button>' +
    '<button class="sh-share" id="shShare" aria-label="แชร์รถคันนี้">🔗</button>' +
    (imgs.length > 1 ? '<button class="sh-nav prev" id="shPrev" aria-label="รูปก่อนหน้า">‹</button><button class="sh-nav next" id="shNext" aria-label="รูปถัดไป">›</button><span class="sh-count" id="shCount">1/' + imgs.length + '</span>' : '') +
    '</div>' +
    (imgs.length > 1 ? '<div class="sh-thumbs">' + imgs.map((u, k) => '<img src="' + esc(u) + '" data-k="' + k + '" class="' + (k === 0 ? 'on' : '') + '" alt="">').join('') + '</div>' : '') +
    '<div class="sh-bd">' + (c.is_hot ? '<span class="sh-hot">🔥 HOT</span>' : '') + '<div class="sh-nm">' + esc(carName(c)) + '</div><div class="sh-price">' + (baht(c.price) || 'สอบถามราคา') + (hasDiscount(c) ? '<s class="old">' + baht(c.original_price) + '</s>' : '') + '</div>' +
    (specs.length ? '<div class="specs">' + specs.map((p) => '<div class="spec"><span>' + p[0] + '</span><b>' + esc(p[1]) + '</b></div>').join('') + '</div>' : '') +
    (cleanDesc(c.description) ? '<div class="desc">' + esc(cleanDesc(c.description)) + '</div>' : '') +
    ((c.tiktok_url && /^https?:\/\//i.test(c.tiktok_url)) ? '<a class="cta cta-tiktok" href="' + esc(c.tiktok_url) + '" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3c.32 2.1 1.62 3.55 3.5 3.8v2.35c-1.16.05-2.32-.2-3.36-.78l-.02 5.6c0 2.96-2.2 5.23-5.06 5.23-2.85 0-5.06-2.27-5.06-5.18 0-2.93 2.27-5.2 5.13-5.2.27 0 .54.02.8.06v2.53a2.6 2.6 0 0 0-.86-.15c-1.46 0-2.6 1.18-2.6 2.7 0 1.5 1.14 2.66 2.6 2.66 1.46 0 2.62-1.13 2.62-2.6V3h2.37z"/></svg>🎵 ดูวิดีโอรถคันนี้ใน TikTok</a>' : '') +
    '<div class="cta-row"><button class="cta cta-line" data-line><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 5.64 2 10.1c0 4 3.55 7.34 8.35 7.97.32.07.77.21.88.49.1.25.07.64.03.9l-.14.86c-.04.25-.2 1 .87.54s5.79-3.41 7.9-5.84C21.3 13.5 22 11.88 22 10.1 22 5.64 17.52 2 12 2z"/></svg>สอบถาม LINE</button>' +
    '<button class="cta cta-call" data-call><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.5 21 3 13.5 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.2 1l-2.3 2.2z"/></svg>โทรเลย</button></div></div>';
  $('#shX').addEventListener('click', closeDetail);
  $('#shShare').addEventListener('click', () => shareCar(cur));
  const D = imgs.length;
  if (D > 1) {
    $('#shPrev').addEventListener('click', () => { curIdx = (curIdx - 1 + D) % D; gallery(D); });
    $('#shNext').addEventListener('click', () => { curIdx = (curIdx + 1) % D; gallery(D); });
    $('#sheet').querySelectorAll('.sh-thumbs img').forEach((t) => t.addEventListener('click', () => { curIdx = Number(t.dataset.k); gallery(D); }));
  }
  $('#sheet').querySelectorAll('[data-line]').forEach((b) => b.addEventListener('click', () => window.open(lineCarUrl(cur), '_blank')));
  $('#sheet').querySelectorAll('[data-call]').forEach((b) => b.addEventListener('click', () => { location.href = 'tel:' + CONFIG.PHONE.replace(/[^0-9+]/g, ''); }));
}
$('#ov').addEventListener('click', (e) => { if (e.target.id === 'ov') closeDetail(); });
$('#statsOv').addEventListener('click', (e) => { if (e.target.id === 'statsOv') closeStats(); });
$('#statsBtn').addEventListener('click', openStats);
document.addEventListener('keydown', (e) => {
  if (!$('#ov').classList.contains('show')) return;
  if (e.key === 'Escape') closeDetail();
  if (cur && cur.images && cur.images.length > 1) {
    const D = cur.images.length;
    if (e.key === 'ArrowLeft') { curIdx = (curIdx - 1 + D) % D; gallery(D); }
    if (e.key === 'ArrowRight') { curIdx = (curIdx + 1) % D; gallery(D); }
  }
});
$('#menuBtn').addEventListener('click', openDrawer);
$('#drawerX').addEventListener('click', closeDrawer);
$('#drawerOv').addEventListener('click', closeDrawer);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && $('#drawer').classList.contains('show')) closeDrawer(); });
let qt;
$('#q').addEventListener('input', (e) => { clearTimeout(qt); const v = e.target.value; qt = setTimeout(() => { query = v.trim(); apply(); }, 200); });
$('#sort').addEventListener('change', (e) => { sort = e.target.value; apply(); });
$('#priceRange').addEventListener('change', (e) => { priceRange = e.target.value; apply(); });
// กันซูมบนมือถือ (iOS เพิกเฉย user-scalable=no จึงต้องกันด้วย JS)
['gesturestart', 'gesturechange', 'gestureend'].forEach((ev) => document.addEventListener(ev, (e) => e.preventDefault()));
let _lastTouchEnd = 0;
document.addEventListener('touchend', (e) => { const n = Date.now(); if (n - _lastTouchEnd <= 350) e.preventDefault(); _lastTouchEnd = n; }, false);
load();
</script>
</body>
